name: CI Main Push

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: spridoloba/emapp

jobs:
  calculate_version:
    runs-on: ubuntu-24.04
    outputs:
      new_tag: ${{ steps.dry_run.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version (dry run)
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  tests:
    runs-on: ubuntu-24.04
    needs: build
    env:
      DB_NAME: ${{ secrets.DB_NAME_SECRET }}
      DB_USERNAME: ${{ secrets.DB_USERNAME_SECRET }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD_SECRET }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ${{ env.DB_NAME }}
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 3306:3306

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Run app and actuator health check
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${{ env.DB_NAME }}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: ${{ env.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.DB_PASSWORD }}
          APP_PORT: 8080
        run: |
          java -jar target/*.jar > app.log 2>&1 &
          for i in {1..35}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health | tee health.json | grep -q '"status":"UP"'; then
              echo "App works, grats"
              exit 0
            fi
            echo "Waiting for actuator health endpoint"
            sleep 3
          done
          echo "Application failed to start"
          cat app.log
          exit 1

  docker_publish:
    runs-on: ubuntu-24.04
    needs: [calculate_version, tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set app version
        run: |
          NEW_TAG="${{ needs.calculate_version.outputs.new_tag }}"
          echo "APP_VERSION=${NEW_TAG#v}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.APP_VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm_package:
    runs-on: ubuntu-24.04
    needs: [calculate_version, tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set app version
        run: |
          NEW_TAG="${{ needs.calculate_version.outputs.new_tag }}"
          echo "APP_VERSION=${NEW_TAG#v}" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm-charts/emapp/

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/tag: "[^"]*"/tag: "'"${APP_VERSION}"'"/g' helm-charts/emapp/values.yaml

      - name: Package Helm chart
        run: |
          helm package helm-charts/emapp/ \
            --version "${APP_VERSION}" \
            --app-version "${APP_VERSION}"

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: emapp-${{ env.APP_VERSION }}.tgz

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR
        run: |
          helm push "emapp-${APP_VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

  create_release:
    runs-on: ubuntu-24.04
    needs: [docker_publish, helm_package]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git tag and GitHub Release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-24.04
    needs: [create_release, calculate_version]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set app version
        run: |
          NEW_TAG="${{ needs.calculate_version.outputs.new_tag }}"
          echo "APP_VERSION=${NEW_TAG#v}" >> "$GITHUB_ENV"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group emapp-rg \
            --name emapp-aks \
            --overwrite-existing

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami Helm repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Deploy MySQL
        run: |
          helm upgrade --install mysql bitnami/mysql \
            --set auth.rootPassword="${{ secrets.MYSQL_ROOT_PASSWORD }}" \
            --set auth.username="${{ secrets.MYSQL_USERNAME }}" \
            --set auth.password="${{ secrets.MYSQL_PASSWORD }}" \
            --set auth.database="${{ secrets.MYSQL_DATABASE }}" \
            --namespace emapp \
            --create-namespace \
            -f helm-charts/sqlvalues.yaml \
            --wait

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.repository_owner }} \
            --password-stdin

      - name: Deploy application
        run: |
          helm upgrade --install emapp \
            oci://ghcr.io/${{ github.repository_owner }}/charts/emapp \
            --version "${{ env.APP_VERSION }}" \
            --set app.image.tag="${{ env.APP_VERSION }}" \
            --set app.config.mysql.databaseUsername="${{ secrets.MYSQL_USERNAME }}" \
            --set app.config.mysql.databaseName="${{ secrets.MYSQL_DATABASE }}" \
            --namespace emapp \
            --create-namespace \
            --wait
