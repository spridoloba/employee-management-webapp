name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  helm_lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tgz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Helm lint (base)
        run: helm lint helm-charts/emapp/

      - name: Helm lint (dev)
        run: helm lint helm-charts/emapp/ -f helm-charts/emapp/values-dev.yaml

      - name: Helm lint (prod)
        run: helm lint helm-charts/emapp/ -f helm-charts/emapp/values-prod.yaml

      - name: Kubeconform (dev)
        run: |
          helm template emapp helm-charts/emapp \
            -f helm-charts/emapp/values-dev.yaml \
            --namespace emapp \
          | kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: Kubeconform (prod)
        run: |
          helm template emapp helm-charts/emapp \
            -f helm-charts/emapp/values-prod.yaml \
            --namespace emapp \
          | kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  terraform_check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

  tests:
    runs-on: ubuntu-24.04
    needs: build
    env:
      DB_NAME: ${{ secrets.DB_NAME_SECRET }}
      DB_USERNAME: ${{ secrets.DB_USERNAME_SECRET }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD_SECRET }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ${{ env.DB_NAME }}
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 3306:3306

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Run app and actuator health check
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${{ env.DB_NAME }}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: ${{ env.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.DB_PASSWORD }}
          APP_PORT: 8080
        run: |
          java -jar target/*.jar > app.log 2>&1 &
          for i in {1..35}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health | tee health.json | grep -q '"status":"UP"'; then
              echo "App works, grats"
              exit 0
            fi
            echo "Waiting for actuator health endpoint"
            sleep 3
          done
          echo "Application failed to start"
          cat app.log
          exit 1

  docker_build:
    runs-on: ubuntu-24.04
    needs: [tests, helm_lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: employee-management-webapp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"           # report-only; tighten to "1" when ready to gate

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: employee-management-webapp:ci
          severity: HIGH,CRITICAL
          exit-code: "0"
