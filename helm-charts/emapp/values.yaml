# -----------------------------------------------------------------------------
# Default values for the emapp chart.
#
# Environment-specific overrides live in:
#   - values-dev.yaml   (Kind, NodePort, plain Secret)
#   - values-prod.yaml  (AKS, Ingress+TLS, SealedSecret, HPA, PDB, NetworkPolicy)
#
# Each feature is gated by its own <feature>.enabled flag so that the same
# chart renders the minimum footprint for local dev and the full hardened
# footprint for production.
# -----------------------------------------------------------------------------

app:
  nameOverride: ""
  fullnameOverride: ""

  image:
    repository: spridoloba/emapp
    tag: ""            # defaults to Chart.appVersion when empty
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  replicaCount: 1
  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceType: ClusterIP

  config:
    profile: prod
    appPort: "8080"
    nodePort: "30080"
    mysql:
      databaseUsername: ""
      databaseName: ""
      secretName: emapp-secret
      secretPasswordName: database_password
      databaseUrl: "jdbc:mysql://mysql:3306/emapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  probes:
    startup:
      path: /actuator/health
      initialDelaySeconds: 20
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 30
    readiness:
      path: /actuator/health
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 5
    liveness:
      path: /actuator/health
      initialDelaySeconds: 0
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 5

  ingress:
    enabled: false
    className: nginx
    host: ""
    path: /
    pathType: Prefix
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    cpu:
      enabled: true
      averageUtilization: 70
    memory:
      enabled: true
      averageUtilization: 80

  pdb:
    enabled: false
    minAvailable: 1

  networkPolicy:
    enabled: false
    # Source label selector that is allowed to reach the pods.
    # Defaults to the ingress-nginx namespace + pod labels.
    ingressFrom:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
    # Extra egress ports beyond DNS + MySQL. Rarely needed.
    egressExtraPorts: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # Plain Kubernetes Secret, suitable for Dev only.
  # Values are set via `--set-file` or `--set` at install time.
  secret:
    create: false
    data:
      database_username: ""
      database_password: ""
      database_root_password: ""
      database_name: ""

  # SealedSecret (bitnami-labs/sealed-secrets). Populate encryptedData with the
  # output of `scripts/seal-secret.sh` and commit it. The sealed-secrets
  # controller in the cluster decrypts it to a regular Secret named
  # `app.config.mysql.secretName`.
  sealedSecret:
    enabled: false
    encryptedData: {}

  podAntiAffinity:
    enabled: false

  topologySpreadConstraints: []

  nodeSelector: {}
  tolerations: []
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
