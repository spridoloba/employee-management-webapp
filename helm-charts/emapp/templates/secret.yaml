{{- /*
Plain Secret, dev/local only. Production uses SealedSecret instead —
see sealedsecret.yaml.
*/ -}}
{{- if and .Values.app.secret.create (not .Values.app.sealedSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "emapp.secretName" . }}
  labels:
    {{- include "emapp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{- range $k, $v := .Values.app.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
