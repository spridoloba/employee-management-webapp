apiVersion: v1
kind: Service
metadata:
  name: {{ include "emapp.fullname" . }}
  labels:
    {{- include "emapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.app.serviceType }}
  selector:
    {{- include "emapp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.app.config.appPort | int }}
      targetPort: http
      protocol: TCP
      {{- if eq .Values.app.serviceType "NodePort" }}
      nodePort: {{ .Values.app.config.nodePort | int }}
      {{- end }}
