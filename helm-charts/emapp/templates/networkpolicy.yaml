{{- if .Values.app.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "emapp.fullname" . }}
  labels:
    {{- include "emapp.labels" . | nindent 4 }}
spec:
  policyTypes: [Ingress, Egress]
  podSelector:
    matchLabels:
      {{- include "emapp.selectorLabels" . | nindent 6 }}
  ingress:
    - from:
        {{- toYaml .Values.app.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.app.config.appPort | int }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MySQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mysql
      ports:
        - protocol: TCP
          port: 3306
    {{- with .Values.app.networkPolicy.egressExtraPorts }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
